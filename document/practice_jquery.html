<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice jQuery</title>
  </head>
  <body>
    <h1>Practice jQuery</h1>
    <p id="name">ここに名前が入ります</p>
    <button id="displayName" type="button">名前を表示</button><br />
    <select id="hobby" name="hobby">
      <option value="0">趣味を選択してください</option>
      <option value="トライアスロン">トライアスロン</option>
      <option value="その他">その他</option>
    </select>
    <div id="triathlon">
      トライアスロンの種目を選択してください
      <select name="triathlon">
        <option value="スイム">スイム</option>
        <option value="バイク">バイク</option>
        <option value="ラン">ラン</option>
      </select>
    </div>
    <div id="otherHobby">
      その他の趣味を入力してください
      <input type="text" name="otherHobby" />
    </div>
    <br />
    名前：<input type="text" name="inputName" /><button id="submitName">
      送信</button
    ><br />
    メールアドレス：<input type="text" id="email" name="email" /><button
      id="submitEmail"
    >
      送信
    </button>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="practice_jquery.js"></script>
  </body>
</html>
